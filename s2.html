<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>VSCO Search Viewer</title>
<style>
body { font-family: system-ui; margin: 20px; background: #f5f5f5; }
.controls { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:15px; }
input, select, button { padding:8px; font-size:14px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:15px; }
.card { background:#fff; border-radius:12px; overflow:hidden; border:1px solid #ddd; }
.card img { width:100%; height:240px; object-fit:cover; display:block; }
.meta { padding:10px; font-size:12px; }
.meta b { display:block; margin-bottom:5px; }
.links a { margin-right:10px; text-decoration:none; color:#0066cc; }
.status { font-size:13px; margin-bottom:10px; }
</style>
</head>
<body>

<h2>VSCO Search Viewer</h2>

<div class="controls">
<input id="query" placeholder="Search keyword">
<input id="target" type="number" value="1200" min="1">
<select id="sort">
<option value="objectId">Sort: ObjectId time (66..)</option>
<option value="date">Sort: API date</option>
<option value="none">No sort</option>
</select>
<input id="filter" placeholder="Filter loaded (e.g. 66cf or maya)">
<button onclick="startSearch()">Search</button>
<button onclick="loadToTarget()">Load to Target</button>
</div>

<div class="status" id="status"></div>
<div class="grid" id="grid"></div>

<script>
const API = "https://vsco.co/api/2.0/search/images";

let allItems = [];
let nextPage = 1;
let currentQuery = "";
let loading = false;

function setStatus(t){ document.getElementById("status").innerText = t; }

function objectIdMs(id){
  if(!/^[0-9a-fA-F]{24}$/.test(id)) return 0;
  return parseInt(id.slice(0,8),16)*1000;
}

function iso(ms){
  if(!ms) return "";
  return new Date(ms).toISOString();
}

function buildMediaUrl(item){
  if(item.username && item.id)
    return `https://vsco.co/${item.username}/media/${item.id}`;
  return item.permalink || "";
}

function thumb(item){
  return item.responsive_url || item.image_url || "";
}

function fullImg(item){
  if(item.original_url) return item.original_url;
  let t = thumb(item);
  return t.replace(/-\d+\.(jpg|jpeg|png|webp)/i,".$1");
}

function caption(item){
  return item.caption || item.description || "";
}

function applyFilter(items){
  let f = document.getElementById("filter").value.toLowerCase();
  if(!f) return items;
  return items.filter(x =>
    (x.id||"").toLowerCase().includes(f) ||
    (x.username||"").toLowerCase().includes(f) ||
    caption(x).toLowerCase().includes(f) ||
    thumb(x).toLowerCase().includes(f)
  );
}

function applySort(items){
  let mode = document.getElementById("sort").value;
  if(mode==="objectId"){
    return [...items].sort((a,b)=>objectIdMs(b.id)-objectIdMs(a.id));
  }
  if(mode==="date"){
    return [...items].sort((a,b)=>Date.parse(b.published_at||0)-Date.parse(a.published_at||0));
  }
  return items;
}

function render(){
  let items = applyFilter(allItems);
  items = applySort(items);

  const grid = document.getElementById("grid");
  grid.innerHTML = items.map(item=>{
    let date = document.getElementById("sort").value==="objectId"
      ? iso(objectIdMs(item.id))
      : item.published_at || "";

    return `
      <div class="card">
        <a href="${buildMediaUrl(item)}" target="_blank">
          <img src="${thumb(item)}">
        </a>
        <div class="meta">
          <b>${date}</b>
          @${item.username||""} • ${item.id||""}
          <div>${caption(item)||""}</div>
          <div class="links">
            <a href="${buildMediaUrl(item)}" target="_blank">Open page</a>
            <a href="${fullImg(item)}" target="_blank">Full image</a>
          </div>
        </div>
      </div>
    `;
  }).join("");

  setStatus(`${items.length} shown of ${allItems.length} loaded`);
}

async function fetchPage(page){
  const res = await fetch(`${API}?query=${encodeURIComponent(currentQuery)}&page=${page}&size=30`);
  const json = await res.json();
  return json.results || [];
}

async function startSearch(){
  currentQuery = document.getElementById("query").value.trim();
  if(!currentQuery) return;

  allItems = [];
  nextPage = 1;
  setStatus("Searching...");
  await loadChunk();
}

async function loadChunk(){
  if(loading) return;
  loading = true;
  const items = await fetchPage(nextPage);
  allItems.push(...items);
  nextPage++;
  render();
  loading = false;
}

async function loadToTarget(){
  let target = parseInt(document.getElementById("target").value)||1200;
  setStatus("Loading to target...");
  while(allItems.length < target){
    let before = allItems.length;
    await loadChunk();
    if(allItems.length === before) break; // no more results
  }
  setStatus("Done.");
}

document.getElementById("filter").addEventListener("input",render);
document.getElementById("sort").addEventListener("change",render);

</script>

</body>
</html>
